<!-- Analysis Page — cargada por el router SPA -->
<div class="page-wrapper" id="analysis-page">

  <!-- Header -->
  <div class="page-header">
    <div class="page-header-info">
      <h1>🧠 Análisis Financiero</h1>
      <p id="analysis-month-label">Entiende mejor cómo usas tu dinero</p>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="grid grid-3 mb-6" id="analysis-summary-container">
    <div class="card" style="padding:20px; text-align:center">
      <span style="font-size:2rem">💰</span>
      <div id="analysis-total-income" style="font-size:1.5rem; font-weight:800; color:#059669; margin-top:8px">$0</div>
      <div class="text-xs text-muted font-bold mt-1 uppercase">Total Ingresos</div>
    </div>
    <div class="card" style="padding:20px; text-align:center">
      <span style="font-size:2rem">💸</span>
      <div id="analysis-total-expense" style="font-size:1.5rem; font-weight:800; color:#DC2626; margin-top:8px">$0</div>
      <div class="text-xs text-muted font-bold mt-1 uppercase">Total Gastos</div>
    </div>
    <div class="card" style="padding:20px; text-align:center">
      <span style="font-size:2rem">⚖️</span>
      <div id="analysis-net-balance" style="font-size:1.5rem; font-weight:800; color:var(--primary); margin-top:8px">$0</div>
      <div class="text-xs text-muted font-bold mt-1 uppercase">Balance Neto</div>
    </div>
  </div>

  <!-- Income vs Expenses Bar -->
  <div class="card mb-6" style="padding:20px">
    <h3 style="font-size:1rem; margin-bottom:12px">Comparativa visual</h3>
    <div id="analysis-comparison-bar">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="grid grid-2">
    <!-- Left Column: Critical Alerts -->
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <span style="font-size:1.2rem">🚨</span>
        <h3 style="font-size:1.1rem">Alertas de Atención</h3>
      </div>
      <div id="analysis-alerts-container">
        <!-- Filled by analysis.js -->
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Right Column: Insights & Tips -->
    <div class="flex flex-col gap-4">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:1.2rem">✨</span>
        <h3 style="font-size:1.1rem">Resumen e Insights</h3>
      </div>
      
      <div class="card" style="padding:20px; border-left: 5px solid var(--primary)">
        <div id="analysis-insights-list" class="flex flex-col gap-3">
          <!-- Filled by analysis.js -->
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Friendly Tip Box -->
      <div id="analysis-tip-container">
        <!-- Filled by analysis.js -->
      </div>
    </div>
  </div>

  <!-- Detailed Category Analysis -->
  <div class="card mt-6">
    <div class="card-header">
      <div class="card-title">🛒 Análisis por Categoría</div>
    </div>
    <div id="analysis-category-details">
      <!-- Filled by analysis.js -->
      <div class="spinner"></div>
    </div>
  </div>

</div>

<script>
  (function() {
    const s = AppState;
    const mn = getMonthName(s.selectedMonth);
    const yr = s.selectedYear;
    const label = document.getElementById('analysis-month-label');
    if (label) label.textContent = `Análisis de inteligencia para ${mn} ${yr}`;
  })();
</script>
